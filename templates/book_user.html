<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book the parking spot</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .card-header {
            background: #ffe082;
            font-weight: bold;
            font-size: 1.2rem;
            color: #333;
            border-radius: 8px 8px 0 0;
            border-bottom: 1px solid #ffd54f;
        }
        .btn-reserve { background: #29b6f6; color: #fff; }
        .btn-cancel { background: #90caf9; color: #333; }
    </style>
</head>
<body>
<div class="container my-5">
    <div class="card shadow" style="max-width: 420px; margin:auto;">
        <div class="card-header text-center">
            Book the parking spot
        </div>
        <div class="card-body">
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Spot_ID :</label>
                    <input type="text" class="form-control" value="{{ spot.id }}" readonly>
                </div>
                <div class="mb-3">
                    <label class="form-label">Lot_ID :</label>
                    <input type="text" class="form-control" value="{{ lot.id }}" readonly>
                </div>
                <div class="mb-3">
                    <label class="form-label">User ID :</label>
                    <input type="text" class="form-control" value="{{ user.id }}" readonly>
                </div>
                <div class="mb-3">
                    <label class="form-label">Vehicle Number :</label>
                    <input type="text" class="form-control" name="vehicle_no" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Location :</label>
                    <input type="text" class="form-control" value="{{ lot.prime_location_name if lot else 'N/A' }}" readonly>
                </div>
                <div class="text-center">
                    <button type="submit" class="btn btn-reserve me-2">Reserve</button>
                    <a href="{{ url_for('user_dashboard') }}" class="btn btn-cancel">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
