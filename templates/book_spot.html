<!DOCTYPE html>
<html lang="en">
<head>
    <title>Release Parking Spot</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .highlight {
            background:#ffe082;
            border-radius:8px;
            padding:8px;
        }
    </style>
</head>
<body>
    <div class="container mt-4" style="max-width: 400px;">
        <h4 class="text-center mb-3 highlight">Release the parking spot</h4>
        <form method="POST">
            <div class="mb-3">
                <label for="spot_id" class="form-label">Spot ID:</label>
                <input type="text" class="form-control" id="spot_id" name="spot_id" value="{{ spot.spot_number }}" readonly>
            </div>
            <div class="mb-3">
                <label for="vehicle_number" class="form-label">Vehicle Number:</label>
                <input type="text" class="form-control" id="vehicle_number" name="vehicle_number" value="{{ reservation.vehicle_number }}" readonly>
            </div>
            <div class="mb-3">
                <label for="parking_time" class="form-label">Parking Time:</label>
                <input type="text" class="form-control" id="parking_time" name="parking_time" value="{{ reservation.date_time }}" readonly>
            </div>
            <div class="mb-3">
                <label for="release_time" class="form-label">Releasing Time:</label>
                <input type="text" class="form-control" id="release_time" name="release_time" value="{{ release_time }}" readonly>
            </div>
            <div class="mb-3">
                <label for="total_cost" class="form-label">Total Cost:</label>
                <input type="text" class="form-control" id="total_cost" name="total_cost" value="{{ total_cost }}" readonly>
            </div>
            <button type="submit" class="btn btn-primary">Release</button>
            <a href="{{ url_for('user_dashboard') }}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</body>
</html>
