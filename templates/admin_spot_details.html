<!DOCTYPE html>
<html lang="en">
<head>
    <title>Occupied Spot Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
</head>
<body>
    <div class="container mt-4">
        <h4>Occupied Parking Spot Details</h4>
        <div>
            <p>ID: {{ spot.id }}</p>
            <p>Customer ID: {{ reservation.user_id }}</p>
            <p>Vehicle Number: {{ reservation.vehicle_no if reservation else 'N/A' }}</p>
        </div>
        <a href="{{ url_for('admin_dashboard') }}" class="btn btn-secondary">Close</a>
    </div>
</body>
</html>
