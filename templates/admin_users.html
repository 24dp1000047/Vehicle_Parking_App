<!DOCTYPE html>
<html lang="en">
<head>
    <title>Registered Users</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .btn { background: #29b6f6; color: #fff; }
    </style>
</head>
<body>
    <div class="container mt-4">
        <h4>Registered Users</h4>
        <table class="table">
            <thead>
                <tr>
                    <th>ID</th><th>Email</th><th>Full Name</th><th>Address</th><th>Pin Code</th>
                </tr>
            </thead>
            <tbody>
                {% for user in users %}
                <tr>
                    <td>{{ user.id }}</td>
                    <td>{{ user.email }}</td>
                    <td>{{ user.fullname }}</td>
                    <td>{{ user.address }}</td>
                    <td>{{ user.pin_code }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <a href="{{ url_for('admin_dashboard') }}" class="btn">Back</a>
    </div>
</body>
</html>
