<!DOCTYPE html>
<html lang="en">
<head>
    <title>Parking Spots</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h4>Parking Spots for {{ lot.prime_location_name }}</h4>
        <table class="table">
            <thead>
                <tr>
                    <th>ID</th><th>Spot Number</th><th>Status</th><th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for spot in spots %}
                <tr>
                    <td>{{ spot.id }}</td>
                    <td>{{ spot.spot_number }}</td>
                    <td>{{ 'Occupied' if spot.is_occupied else 'Open' }}</td>
                    <td>
                        <a href="{{ url_for('admin_delete_spot', spot_id=spot.id, lot_id=lot.id) }}" class="btn btn-danger btn-sm">Delete</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
