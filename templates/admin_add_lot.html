<!DOCTYPE html>
<html lang="en">
<head>
    <title>Add Parking Lot</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h4>Add Parking Lot</h4>
        <form method="POST">
            <input type="text" name="prime_location_name" placeholder="Location Name" class="form-control mb-2" required>
            <input type="text" name="address" placeholder="Address" class="form-control mb-2" required>
            <input type="text" name="pin_code" placeholder="Pin Code" class="form-control mb-2" required>
            <input type="number" name="price" placeholder="Price per hour" class="form-control mb-2" required>
            <input type="number" name="maximum_number_of_spots" placeholder="Maximum spots" class="form-control mb-2" required>
            <button type="submit" class="btn btn-primary">Add</button>
            <a href="{{ url_for('admin_dashboard') }}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</body>
</html>
