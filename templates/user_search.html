<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Search Parking Lots</title>
    <style>
        body {
            background: #f8f9fa;
            font-family: Arial, sans-serif;
        }

        .container {
            max-width: 900px;
            margin: 30px auto;
            background: #fff;
            border-radius: 12px;
            padding: 24px;
        }

        h2 {
            color: #1976d2;
            margin-bottom: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 24px;
        }

        th,
        td {
            border: 1px solid #bbb;
            padding: 8px 10px;
            text-align: center;
        }

        th {
            background: #e3f2fd;
        }

        .btn {
            padding: 5px 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-book {
            background: #4caf50;
            color: #fff;
        }

        .badge-success {
            background: #c8e6c9;
            color: #388e3c;
            padding: 4px 10px;
            border-radius: 5px;
        }

        .search-label {
            color: #e53935;
            font-size: 1rem;
        }

        .search-row {
            margin-bottom: 18px;
        }

        input[type="text"] {
            padding: 6px;
            border-radius: 4px;
            border: 1px solid #bbb;
        }
    </style>
</head>

<body>
    <div class="container">
        <form method="get" action="{{ url_for('user_search') }}" class="search-row">
            <label class="search-label">Search parking @location/pin code :</label>
            <input type="text" name="search" placeholder="Dadar Road" value="{{ search or '' }}">
            <button type="submit" class="btn btn-book">Search</button>
            <a href="{{ url_for('user_dashboard') }}" class="btn" style="background:#90caf9;color:#333;">Back</a>
        </form>
        <h2>Parking Lots{% if search %} @ {{ search }}{% endif %}</h2>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Address</th>
                    <th>Availability</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                {% for lot in lots %}
                <tr>
                    <td>{{ lot.id }}</td>
                    <td>{{ lot.address }}</td>
                    <td>{{ lot.available_spots }}</td>
                    <td>
                        {% if lot.available_spots > 0 %}
                        <a href="{{ url_for('book_parking', lot_id=lot.id) }}" class="btn btn-book">Book</a>
                        {% else %}
                        <span class="badge-success">Full</span>
                        {% endif %}
                    </td>
                </tr>
                {% else %}
                <tr>
                    <td colspan="4">No lots found.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>

</html>
