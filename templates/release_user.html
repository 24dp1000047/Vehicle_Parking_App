<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Release Parking Spot</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container my-5">
    <div class="card shadow p-4">
        <h4 class="mb-4 text-primary">Release the parking spot</h4>
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Spot ID:</label>
                <input type="text" class="form-control" value="{{ reservation.spot_id }}" readonly>
            </div>
            <div class="mb-3">
                <label class="form-label">Vehicle Number:</label>
                <input type="text" class="form-control" value="{{ reservation.vehicle_no }}" readonly>
            </div>
            <div class="mb-3">
                <label class="form-label">Parking Time:</label>
                <input type="text" class="form-control" value="{{ reservation.timestamp.strftime('%Y-%m-%d %H:%M') }}" readonly>
            </div>
            <div class="mb-3">
                <label class="form-label">Releasing Time:</label>
                <input type="text" class="form-control" value="{{ reservation.releasing_time.strftime('%Y-%m-%d %H:%M') if reservation.releasing_time else 'N/A' }}" readonly>
            </div>
            <div class="mb-3">
                <label class="form-label">Total Cost:</label>
                <input type="text" class="form-control" value="{{ '%.2f' % reservation.total_cost if reservation.total_cost is not none else 'N/A' }}" readonly>
            </div>
            <button type="submit" class="btn btn-primary">Release</button>
            <a href="{{ url_for('user_dashboard') }}" class="btn btn-secondary ms-2">Cancel</a>
        </form>
    </div>
</div>
</div>
</body>
</html>
