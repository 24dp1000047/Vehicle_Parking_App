<!DOCTYPE html>
<html lang="en">
<head>
    <title>Edit Parking Lot</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h4>Edit Parking Lot</h4>
        <form method="POST">
            <label for="prime_location_name">Prime Location Name:</label>
            <input type="text" name="prime_location_name" value="{{ lot.prime_location_name }}" class="form-control mb-2" required>
            <label for="address">Address:</label>
            <input type="text" name="address" value="{{ lot.address }}" class="form-control mb-2" required>
            <label for="pin_code">Pin Code:</label>
            <input type="text" name="pin_code" value="{{ lot.pin_code }}" class="form-control mb-2" required>
            <label for="price">Price:</label>
            <input type="number" name="price" value="{{ lot.price }}" class="form-control mb-2" required>
            <label for="maximum_number_of_spots">Maximum Number of Spots:</label>
            <input type="number" name="maximum_number_of_spots" value="{{ lot.maximum_number_of_spots }}" class="form-control mb-2" required>
            <button type="submit" class="btn btn-success">Update</button>
            <a href="{{ url_for('admin_dashboard') }}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</body>
</html>
