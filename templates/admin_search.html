<!DOCTYPE html>
<html lang="en">
<head>
    <title>Search Parking Lots</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h4>Search Parking Lots</h4>
        <form method="GET">
            <input type="text" name="search" placeholder="Search string" class="form-control mb-2">
            <button type="submit" class="btn btn-primary">Search</button>
        </form>
        <div>
            {% for lot in results %}
                <div>{{ lot.prime_location_name }} - {{ lot.address }}</div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
