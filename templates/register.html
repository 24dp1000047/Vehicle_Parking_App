<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Signup</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; }
        .register-box {
            max-width: 450px;
            margin: 40px auto;
            padding: 30px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 0 10px rgba(0,0,0,0.08);
        }
        .register-title { color: #6c63ff; }
        .login-link { color: #ff9800; }
        .note { font-size: 0.95em; color: #888; }
    </style>
</head>
<body>
    <div class="register-box">
        <h2 class="register-title text-center mb-4">User Signup</h2>
        <form method="POST">
            <div class="mb-3">
                <label for="email" class="form-label">Email (ID/Username):</label>
                <input type="email" class="form-control" id="email" name="email" placeholder="Enter email" required>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Password:</label>
                <input type="password" class="form-control" id="password" name="password" placeholder="Enter password" required>
            </div>
            <div class="mb-3">
                <label for="fullname" class="form-label">Fullname:</label>
                <input type="text" class="form-control" id="fullname" name="fullname" placeholder="Enter fullname" required>
            </div>
            <div class="mb-3">
                <label for="address" class="form-label">Address:</label>
                <input type="text" class="form-control" id="address" name="address" placeholder="Enter address" required>
            </div>
            <div class="mb-3">
                <label for="pincode" class="form-label">Pin Code:</label>
                <input type="text" class="form-control" id="pincode" name="pin_code" placeholder="Enter pin code" required>
            </div>
            <button type="submit" class="btn btn-success w-100">Register</button>
        </form>
        <div class="text-center mt-3">
            <a href="{{ url_for('login') }}" class="login-link">Login here!</a>
        </div>
        <div class="note text-center mt-2">
            No registration required for Admin
        </div>
    </div>
</body>
</html>
